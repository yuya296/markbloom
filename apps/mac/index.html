<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarkBloom mac</title>
  </head>
  <body>
    <div id="app">
      <header class="toolbar">
        <div class="toolbar-actions">
          <button id="open-file" type="button">Open</button>
          <button id="save-file" type="button">Save</button>
          <div class="settings-menu">
            <button
              id="settings-toggle"
              type="button"
              aria-label="Open settings"
              aria-haspopup="dialog"
              aria-controls="settings-panel"
              aria-expanded="false"
            >
              Settings
            </button>
            <div id="settings-panel" class="settings-panel" role="dialog" aria-label="Editor settings" hidden>
              <label class="settings-item">
                <input id="toggle-wrap-lines" type="checkbox" checked />
                Line wrapping
              </label>
            </div>
          </div>
        </div>
      </header>
      <main>
        <div id="editor" class="editor"></div>
      </main>
      <footer class="footer">
        <span id="file-info">File: sample.md</span>
        <span id="status">Length: 0</span>
        <span id="change-info">No changes yet.</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
