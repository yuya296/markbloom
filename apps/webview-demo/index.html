<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>webview-demo</title>
  </head>
  <body>
    <div id="app">
      <div class="top-controls">
        <button id="toggle-theme" class="icon-button" type="button" aria-label="Toggle theme">
          <span class="icon material-symbols-outlined" data-icon="sun" aria-hidden="true">
            light_mode
          </span>
          <span class="icon material-symbols-outlined" data-icon="moon" aria-hidden="true">
            dark_mode
          </span>
        </button>
        <div class="settings-menu">
          <button
            id="settings-toggle"
            class="icon-button"
            type="button"
            aria-label="Open settings"
            aria-haspopup="dialog"
            aria-controls="settings-panel"
            aria-expanded="false"
          >
            <span class="icon material-symbols-outlined" data-icon="gear" aria-hidden="true">
              settings
            </span>
          </button>
          <div
            id="settings-panel"
            class="settings-panel"
            role="dialog"
            aria-label="Editor settings"
            hidden
          >
            <label class="control-item">
              <input id="toggle-line-numbers" type="checkbox" />
              Line numbers
            </label>
            <label class="control-item">
              <input id="toggle-wrap" type="checkbox" checked />
              Line wrapping
            </label>
            <label class="control-item">
              <input id="toggle-live-preview" type="checkbox" checked />
              Live preview
            </label>
            <label class="control-item">
              <input id="toggle-block-reveal" type="checkbox" checked />
              Block reveal
            </label>
            <label class="control-item">
              Tab size
              <input id="tab-size" type="number" min="2" max="8" value="4" />
            </label>
            <button id="apply" type="button">Apply</button>
          </div>
        </div>
      </div>
      <main>
        <div id="editor" class="editor"></div>
      </main>
      <footer class="footer">
        <span id="change-info">No changes yet.</span>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
